name: smart_assistant
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0  # 确保有这一行

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_markdown: ^0.7.7+1
  # 新增：用于解析 .env 配置文件（毕设安全性要求）
  flutter_dotenv: ^5.2.1
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  share_plus: ^12.0.2
  webview_flutter: ^4.10.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 关键修改：注册资源文件
  assets:
    # 注册插件配置文件
    - lib/plugins/commute/manifest.json
    - lib/plugins/document_assistant/manifest.json
    - lib/plugins/datasheet_assistant/manifest.json
    - lib/plugins/paper_assistant/manifest.json
    # - .env

  # 如果你以后要加自定义字体，可以在下方继续添加
